name: LadderLog
options:
  bundleIdPrefix: com.shimondeitel.ladderlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  LadderLog:
    type: application
    platform: iOS
    sources:
      - path: LadderLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ladderlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: LadderLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LadderLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LadderLogTests
      - path: LadderLog.storekit
    dependencies:
      - target: LadderLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ladderlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LadderLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LadderLogUITests
    dependencies:
      - target: LadderLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ladderlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  LadderLog:
    build:
      targets:
        LadderLog: all
        LadderLogTests: [test]
        LadderLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: LadderLog.storekit
    test:
      config: Debug
      storeKitConfiguration: LadderLog.storekit
      targets:
        - LadderLogTests
        - LadderLogUITests
    archive:
      config: Release
